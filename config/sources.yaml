# Pain-signal source configuration.
# Toggle a source off by setting enabled: false — the orchestrator will skip it.
# Actor IDs can be swapped without code changes if an Apify actor breaks or a better one appears.

reddit:
  enabled: true
  apify_actor: "trudax/reddit-scraper-lite"

hackernews:
  enabled: true
  # No actor, no auth — uses the public Algolia HN Search API directly.

g2:
  enabled: true
  apify_actor: "epctex/g2-scraper"
  max_stars: 3              # only pull 1-3 star reviews (negative-only)

quora:
  enabled: true
  apify_actor: "epctex/quora-scraper"
